spring:
  application:
    name: desktop-pet
server:
  port: -1

# 桌宠配置
pet:
  main:
    width: 200
    height: 250
    always-on-top: true
    drag-enabled: true

  bubble:
    show-time: 3000
    opacity: 0.9

  ai:
    timeout: 10000
    max-tokens: 1024

  schedule:
    remind-before-minutes: 5
    check-interval: 1000

logging:
  level:
    com.pet: info
